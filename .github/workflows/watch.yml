name: Watch Odyssey IMAX 70mm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test_date:
        description: "Override target date (YYYY-MM-DD) for an end-to-end alert test"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

concurrency:
  group: watch
  cancel-in-progress: false

env:
  NTFY_TOPIC: odyssey-imax-70mm-88955e30

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      # The cron fires every 5 minutes (GitHub's floor); checking three times
      # inside each run (at 0 / 2 / 4 min) gives ~2-minute effective polling.
      - name: Check Cineplex showtimes (x3, 2 min apart)
        id: check
        env:
          CINEWATCHER_DATE: ${{ inputs.test_date }}
        run: |
          for i in 1 2 3; do
            python3 checker.py
            if grep -qE '^(changed|new70)=true$' "$GITHUB_OUTPUT"; then break; fi
            if [ "$i" -lt 3 ]; then sleep 120; fi
          done

      # Notifications fire FIRST so a later git failure can never block them.
      - name: Alert on new IMAX 70mm showtimes
        if: steps.check.outputs.new70 == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PREFIX: ${{ inputs.test_date != '' && '[TEST] ' || '' }}
        run: |
          # Telegram push (primary channel). Secrets: TELEGRAM_BOT_TOKEN (from
          # @BotFather) and TELEGRAM_CHAT_ID (from @userinfobot).
          if [ -n "${{ secrets.TELEGRAM_BOT_TOKEN }}" ] && [ -n "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
            curl -sS --max-time 20 "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              --data-urlencode chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              --data-urlencode "text@alert.txt" || true
          fi

          # ntfy push (secondary; subscribe to the topic in the ntfy app)
          curl -sS --max-time 20 \
            -H "Title: ${PREFIX}Odyssey IMAX 70mm tickets are UP (Aug 21)" \
            -H "Priority: urgent" \
            -H "Tags: rotating_light,clapper" \
            -d "${PREFIX}New IMAX 70mm showtimes just appeared at Vaughan/Mississauga. Book now: https://www.cineplex.com/movie/the-odyssey" \
            "https://ntfy.sh/${NTFY_TOPIC}" || true

          # GitHub issue with the full showtime list and buy links
          gh label create odyssey-alert --color FF0000 --force || true
          existing=$(gh issue list --state open --label odyssey-alert --json number --jq '.[0].number' || echo "")
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file alert.md
          else
            gh issue create \
              --title "${PREFIX}🚨 The Odyssey IMAX 70mm showtimes are UP for Aug 21" \
              --label odyssey-alert \
              --body-file alert.md
          fi

      - name: Commit status update
        if: steps.check.outputs.changed == 'true' && inputs.test_date == ''
        run: |
          git config user.name "cinewatcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/status.json state.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "status: update showtime state"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      # GitHub reliably emails on failed runs (and pushes via the mobile app if
      # Actions notifications are enabled there) — unlike @mention
      # notifications, which are suppressed for self-triggered activity. After
      # all alerts have gone out, fail the run on purpose: the
      # "Run failed: Watch Odyssey IMAX 70mm" email IS the alert.
      - name: Fail loudly so GitHub sends a run-failed email
        if: always() && steps.check.outputs.new70 == 'true'
        run: |
          echo "::error::🚨 ODYSSEY IMAX 70MM TICKETS ARE UP FOR AUG 21 — this failure is intentional, it is your email alert. Book: https://www.cineplex.com/movie/the-odyssey"
          exit 1
